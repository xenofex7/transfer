# transfer deployment stack
#
# Usage:
#   cp .env.example .env             # then edit .env
#   htpasswd -B -c htpasswd <user>   # create the auth file BEFORE first start
#   docker compose up -d
#
# Reverse-proxy (TLS termination) is expected to live OUTSIDE this compose file
# and forward to the `transfer` service over the shared `proxy` network.
#
# By default the stack joins an EXTERNAL bridge network called `proxy`.
# Override with the PROXY_NETWORK variable in .env if your reverse-proxy lives
# on a network with a different name.

name: transfer

services:
  transfer:
    image: ${TRANSFER_IMAGE:-ghcr.io/xenofex7/transfer:latest}
    restart: unless-stopped
    environment:
      LISTENER: ":8080"
      BASEDIR: "/data"
      TEMP_PATH: "/tmp/transfer"
      PURGE_DAYS: "${PURGE_DAYS:-360}"
      PURGE_INTERVAL: "${PURGE_INTERVAL:-24}"
      MAX_UPLOAD_SIZE: "${MAX_UPLOAD_SIZE:-5242880}"   # in KB, default 5 GiB
      RATE_LIMIT: "${RATE_LIMIT:-0}"
      RANDOM_TOKEN_LENGTH: "${RANDOM_TOKEN_LENGTH:-10}"
      HTTP_AUTH_HTPASSWD: "/etc/transfer/htpasswd"
      HTTP_AUTH_IP_WHITELIST: "${HTTP_AUTH_IP_WHITELIST:-}"
      IP_WHITELIST: "${IP_WHITELIST:-}"
      IP_BLACKLIST: "${IP_BLACKLIST:-}"
      CORS_DOMAINS: "${CORS_DOMAINS:-}"
      PROXY_PATH: "${PROXY_PATH:-}"
      PROXY_PORT: "${PROXY_PORT:-}"
      EMAIL_CONTACT: "${EMAIL_CONTACT:-}"
      TAGLINE: "${TAGLINE:-Easy and fast file sharing from the command line.}"
      UPLOAD_WEBHOOK_URL: "${UPLOAD_WEBHOOK_URL:-}"
      WEBHOOK_TOKEN: "${WEBHOOK_TOKEN:-}"
      UMAMI_SCRIPT_URL: "${UMAMI_SCRIPT_URL:-}"
      UMAMI_WEBSITE_ID: "${UMAMI_WEBSITE_ID:-}"
      UMAMI_HEARTBEAT: "${UMAMI_HEARTBEAT:-}"
      UMAMI_HEARTBEAT_URL: "${UMAMI_HEARTBEAT_URL:-}"
      UMAMI_HEARTBEAT_WEBSITE_ID: "${UMAMI_HEARTBEAT_WEBSITE_ID:-}"
    volumes:
      - ${DATA_DIR:-./data}:/data
      # Mounted read-write so the /admin/users UI can add/reset/delete
      # users in place. Keep the file outside any world-readable path on
      # the host.
      - type: bind
        source: ./htpasswd
        target: /etc/transfer/htpasswd
        bind:
          create_host_path: false
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health.html"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: ${TRANSFER_MEMORY_LIMIT:-512M}
    security_opt:
      - no-new-privileges:true

networks:
  proxy:
    name: ${PROXY_NETWORK:-proxy}
    external: true
