name: Build and publish container image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    # Doc/test-only commits do not change the produced image, so they
    # do not need to spend ~3min of GHA time and pollute the run list.
    # Tag pushes ignore this list (GitHub treats tag triggers
    # separately), so a release always builds even if the tag points
    # at a doc-only commit.
    paths-ignore:
      - '**.md'
      - 'CHANGELOG.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

# Cancel any in-flight build for the same ref when a newer commit
# lands — saves CI minutes when a release commit is immediately
# followed by a cleanup commit on the same branch. Tag builds
# (refs/tags/vX.Y.Z) get their own group and never cancel each other.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.licenses=MIT

      - name: Resolve build version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Tag build: ship the clean semver string (e.g. v1.4.0).
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            # Branch build: use git describe so the binary still surfaces
            # the most recent tag plus a short distance (e.g. v1.4.0-2-gabc1234).
            # Falls back to the short SHA when no tags exist yet.
            DESCRIBE="$(git describe --tags --always --dirty 2>/dev/null || git rev-parse --short HEAD)"
            echo "version=${DESCRIBE}" >> "$GITHUB_OUTPUT"
          fi
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "vcs_ref=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            VCS_REF=${{ steps.version.outputs.vcs_ref }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
